<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BluePeak Login</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<main class="auth-page">
  <section class="auth-panel">

  <img src="./images/logo.png" class="auth-logo" alt="BluePeak">

  <div class="auth-badge">
    🔒 Secure Login
  </div>

  <h1>Welcome Back</h1>

  <p class="auth-desc">
    Access your investments, wallet balance,
    referrals and earnings from one dashboard.
  </p>

  <div class="auth-benefits">
    <span>🎁 Welcome Bonus</span>
    <span>👥 30% Referral Bonus</span>
    <span>📈 Daily ROI</span>
  </div>

  <div class="input-group">
    <label>Email Address</label>
    <input
      type="email"
      id="email"
      placeholder="you@example.com"
    >
  </div>

  <div class="input-group">
    <label>Password</label>

    <div class="password-box">
      <input
        type="password"
        id="password"
        placeholder="Enter password"
      >

      <button
        type="button"
        class="toggle-password"
        onclick="togglePassword()"
      >
        👁
      </button>
    </div>
  </div>

  <button id="loginBtn" class="primary-btn">
    Login
  </button>

  <p id="message" class="form-message"></p>

  <p class="auth-switch">
    <a href="forgot-password.html">
      Forgot password?
    </a>
  </p>

  <div class="login-trust">

  <div class="trust-item">
    🔒 Secure Authentication
  </div>

  <div class="trust-item">
    💳 Safe Wallet Transactions
  </div>

  <div class="trust-item">
    📈 Real-Time Investment Tracking
  </div>

</div>

  <p class="auth-switch">
    New to BluePeak?
    <a href="register.html">
      Create Account
    </a>
  </p>


</section>
</main>

<script>
async function loginUser() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const message = document.getElementById("message");
  const button = document.getElementById("loginBtn");

  if (!email || !password) {
    message.innerText = "Email and password are required.";
    message.className = "form-message error";
    return;
  }

  button.disabled = true;
  button.innerText = "Logging in...";
  message.innerText = "";

  try {
    const response = await fetch("http://localhost:3001/api/auth/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({ email, password }),
    });

    const data = await response.json();
    message.innerText = data.message;
    message.className = "form-message";
    message.classList.add(response.ok? "success":"error");

    if (response.ok && data.token) {
      localStorage.setItem("token", data.token);
      localStorage.setItem("user", JSON.stringify(data.user));
      window.location.href = data.user?.isAdmin ? "admin.html" : "dashboard.html";
    }
  } catch (error) {
    console.log("LOGIN ERROR:", error);
    message.innerText = "Something went wrong.";
    message.className = "form-message error";
  } finally {
    button.disabled = false;
    button.innerText = "Login";
  }
}

document.getElementById("loginBtn").addEventListener("click", loginUser);
document.addEventListener("keydown", (event) => {
  if (event.key === "Enter") loginUser();
});
</script>

</body>
</html>
