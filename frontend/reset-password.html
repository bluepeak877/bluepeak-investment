<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<main class="auth-page">
  <section class="auth-panel">
    <img src="./images/logo.png" class="auth-logo" alt="BluePeak">
    <h1>Choose New Password</h1>
    <p>Your password must be at least 8 characters.</p>

    <label for="password">New Password</label>
    <input type="password" id="password" placeholder="Enter new password">

    <label for="confirmPassword">Confirm Password</label>
    <input type="password" id="confirmPassword" placeholder="Confirm new password">

    <button id="resetBtn" class="primary-btn">Reset Password</button>
    <p id="message" class="form-message"></p>

    <p class="auth-switch">
      <a href="login.html">Back to login</a>
    </p>
  </section>
</main>

<script>
const params = new URLSearchParams(window.location.search);
const token = params.get("token");

if (!token) {
  document.getElementById("message").innerText = "Missing password reset token.";
  document.getElementById("resetBtn").disabled = true;
}

async function resetPassword() {
  const password = document.getElementById("password").value;
  const confirmPassword = document.getElementById("confirmPassword").value;
  const message = document.getElementById("message");
  const button = document.getElementById("resetBtn");

  if (!password || !confirmPassword) {
    message.innerText = "Enter and confirm your new password.";
    return;
  }

  if (password !== confirmPassword) {
    message.innerText = "Passwords do not match.";
    return;
  }

  button.disabled = true;
  button.innerText = "Resetting...";
  message.innerText = "";

  try {
    const response = await fetch("https://bluepeak-api-ooxc.onrender.com/api/auth/reset-password", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({ token, password }),
    });

    const data = await response.json();
    message.innerText = data.message;

    if (response.ok) {
      setTimeout(() => {
        window.location.href = "login.html";
      }, 1000);
    }
  } catch (error) {
    console.log("RESET PASSWORD ERROR:", error);
    message.innerText = "Something went wrong.";
  } finally {
    button.disabled = false;
    button.innerText = "Reset Password";
  }
}

document.getElementById("resetBtn").addEventListener("click", resetPassword);
</script>

</body>
</html>
