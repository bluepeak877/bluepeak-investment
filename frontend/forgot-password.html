<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<main class="auth-page">
  <section class="auth-panel">
    <img src="./images/logo.png" class="auth-logo" alt="BluePeak">
    <h1>Reset Password</h1>
    <p>Enter your account email to generate a secure reset link.</p>

    <label for="email">Email</label>
    <input type="email" id="email" placeholder="you@example.com">

    <button id="forgotBtn" class="primary-btn">Generate Reset Link</button>
    <p id="message" class="form-message"></p>
    <div id="devResetLink" class="dev-reset-link"></div>

    <p class="auth-switch">
      Remembered it? <a href="login.html">Back to login</a>
    </p>
  </section>
</main>

<script>
async function requestReset() {
  const email = document.getElementById("email").value.trim();
  const message = document.getElementById("message");
  const button = document.getElementById("forgotBtn");
  const devResetLink = document.getElementById("devResetLink");

  if (!email) {
    message.innerText = "Email is required.";
    return;
  }

  button.disabled = true;
  button.innerText = "Generating...";
  message.innerText = "";
  devResetLink.innerHTML = "";

  try {
    const response = await fetch("https://bluepeak.ng/api/auth/forgot-password", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({ email }),
    });

    const data = await response.json();
    message.innerText = data.message;

    if (response.ok && data.resetLink) {
      devResetLink.innerHTML = `
        <p>Development reset link:</p>
        <a href="${data.resetLink}">${data.resetLink}</a>
      `;
    }
  } catch (error) {
    console.log("FORGOT PASSWORD ERROR:", error);
    message.innerText = "Something went wrong.";
  } finally {
    button.disabled = false;
    button.innerText = "Generate Reset Link";
  }
}

document.getElementById("forgotBtn").addEventListener("click", requestReset);
document.addEventListener("keydown", (event) => {
  if (event.key === "Enter") requestReset();
});
</script>

</body>
</html>
